windowrule = suppress_event maximize, match:class .*

windowrule {
    name = floating-windows
    match:class = Floating
    float = true
    center = true
    size = 700 600
}

windowrule {
    name = update-prompt
    match:class = UpdatePrompt
    workspace = 1
    float = true
    center = true
    size = 700 600
}
